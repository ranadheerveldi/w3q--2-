<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: white;
            width: 360px;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 16px;
        }

        .form-row label {
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-row input {
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #d1d1d6;
            font-size: 14px;
            outline: none;
        }

        .form-row input::placeholder {
            color: #9e9ea3;
        }

        .form-row input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 14px;
            background-color: #007aff;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #005fd1;
        }

        .info {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            text-align: center;
        }
    </style>

    
</head>

<body>
    <div class="login-card">
        <h2>Login</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-row">
                <label for="username">Username</label>
                <input type="text" name="username" id="username"
                       placeholder="Enter your username" required>
            </div>

            <div class="form-row">
                <label for="password">Password</label>
                <input type="password" name="password" id="password"
                       placeholder="Enter your password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        {% if username %}
            <div class="info">
                You entered: <strong>{{ username }}</strong>
            </div>
        {% endif %}
    </div>
</body>
</html>
